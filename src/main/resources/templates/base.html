<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
</head>

<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">

            <table width="600" cellpadding="0" cellspacing="0"
                   style="background-color:#ffffff; margin-top:40px; border-radius:8px; overflow:hidden;">

                <!-- HEADER -->
                <tr>
                    <td style="background-color:#8b0000; padding:20px; text-align:center; color:#ffffff;">
                        <h1 style="margin:0; font-size:24px;">Fatec Itaquera</h1>
                    </td>
                </tr>

                <!-- CONTENT -->
                <tr>
                    <td style="padding:30px; color:#333333;">
                        <div layout:fragment="content">
                        </div>
                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="background-color:#f4f6f8; padding:15px; text-align:center; font-size:12px; color:#999;">
                        © <span th:text="${year}"></span> Fatec Itaquera — Todos os direitos reservados
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>
</body>
</html>
