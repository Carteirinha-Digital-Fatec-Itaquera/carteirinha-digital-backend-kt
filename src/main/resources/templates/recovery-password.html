<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{base}">
<head>
    <title>Recuperar acesso</title>
</head>
<body>

<div layout:fragment="content">

    <p style="font-size: 16px;">Olá,</p>

    <p style="font-size: 15px; line-height: 1.6;">
        Você solicitou a <b>recuperação de senha</b> para sua conta.
    </p>

    <p style="font-size: 15px; margin-top: 20px;">
        Utilize o código abaixo para continuar o processo:
    </p>

    <div style="margin: 30px 0; text-align: center;">
        <span style="
            display: inline-block;
            background-color: #f0f0f0;
            padding: 15px 25px;
            font-size: 22px;
            letter-spacing: 3px;
            font-weight: bold;
            border-radius: 6px;
            color: #000000;
        ">
            <span th:text="${token}"></span>
        </span>
    </div>

    <p style="font-size: 14px; color: #666666; line-height: 1.6;">
        Se você não solicitou esta recuperação, basta ignorar este e-mail.
    </p>

    <p style="margin-top: 30px; font-size: 15px;">
        Atenciosamente,<br>
        <b>Equipe Fatec Itaquera</b>
    </p>

</div>

</body>
</html>
